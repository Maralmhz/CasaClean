<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CasaClean</title>
  <meta name="description" content="App de tarefas domésticas com escala semanal, checklist e histórico">
  <meta name="theme-color" content="#6c63ff">

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- iOS (iPhone/iPad) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CasaClean">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <script>
    (function() {
      const t = localStorage.getItem('cc-theme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body>
<div id="app">

  <div class="toast-container" id="toastContainer"></div>

  <!-- LIGHTBOX -->
  <div class="lightbox hidden" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightboxImg" src="" alt="Foto ampliada">
  </div>

  <!-- PIN MODAL -->
  <div class="modal-overlay hidden" id="pinModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p class="modal-title" id="pinModalTitle">Digite seu PIN</p>
      <div class="pin-display">
        <div class="pin-dot" id="pd0"></div>
        <div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div>
        <div class="pin-dot" id="pd3"></div>
      </div>
      <div class="pin-pad">
        <button class="pin-key" data-k="1">1</button>
        <button class="pin-key" data-k="2">2</button>
        <button class="pin-key" data-k="3">3</button>
        <button class="pin-key" data-k="4">4</button>
        <button class="pin-key" data-k="5">5</button>
        <button class="pin-key" data-k="6">6</button>
        <button class="pin-key" data-k="7">7</button>
        <button class="pin-key" data-k="8">8</button>
        <button class="pin-key" data-k="9">9</button>
        <button class="pin-key del" data-k="cancel">✕</button>
        <button class="pin-key" data-k="0">0</button>
        <button class="pin-key del" data-k="del">⌫</button>
      </div>
      <p class="pin-error" id="pinError"></p>
    </div>
  </div>

  <!-- LOGIN -->
  <div class="screen active" id="screen-login">
    <div class="login-hero">
      <img src="/logo.jpg" alt="CasaClean" class="login-logo">
      <p>Família Oliveira Amaral</p>
    </div>
    <div class="user-grid" id="userGrid"></div>
  </div>

  <!-- HOME -->
  <div class="screen" id="screen-home">
    <div class="topbar">
      <div class="topbar-logo">
        <img src="/logo.jpg" alt="CasaClean" class="topbar-logo-img">
      </div>
      <div class="topbar-actions">
        <div class="avatar-pill" id="currentUserPill" onclick="logout()">
          <div class="av" id="currentUserAv"></div>
          <span id="currentUserName">—</span>
        </div>
        <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Alternar tema">🌙</button>
        <button class="icon-btn" onclick="requestNotificationPermission()" title="Notificações">🔔</button>
      </div>
    </div>
    <div class="main-content">
      <div class="date-badge">
        <div>
          <div class="date-text" id="dateLabel"></div>
          <div class="date-sub" id="dateSubLabel"></div>
        </div>
        <div class="date-emoji" id="dateEmoji">📅</div>
      </div>
      <div class="summary-strip">
        <div class="summary-item">
          <span class="s-value" id="sumTotal" style="color:var(--accent2)">0</span>
          <span class="s-label">Total</span>
        </div>
        <div class="summary-item">
          <span class="s-value" id="sumDone" style="color:var(--green)">0</span>
          <span class="s-label">Feitas</span>
        </div>
        <div class="summary-item">
          <span class="s-value" id="sumPending" style="color:var(--red)">0</span>
          <span class="s-label">Pendentes</span>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="section-head">
        <div>
          <h2>Tarefas de hoje</h2>
          <p id="taskSubtitle">Carregando...</p>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="toggleFilter()" id="filterBtn">Todas</button>
      </div>
      <div class="tasks-list" id="tasksList"></div>
    </div>
    <nav class="bottom-nav">
      <button class="nav-item active" data-screen="home"><span class="nav-icon">🏠</span>Hoje</button>
      <button class="nav-item" data-screen="history"><span class="nav-icon">📋</span>Histórico</button>
      <button class="nav-item" data-screen="medals"><span class="nav-icon">🏆</span>Medalhas</button>
      <button class="nav-item" data-screen="config"><span class="nav-icon">⚙️</span>Config</button>
    </nav>
  </div>

  <!-- HISTORY -->
  <div class="screen" id="screen-history">
    <div class="topbar">
      <div class="topbar-logo"><img src="/logo.jpg" alt="CasaClean" class="topbar-logo-img"></div>
      <div class="topbar-actions">
        <div class="avatar-pill" id="histUserPill" onclick="logout()">
          <div class="av" id="histUserAv"></div>
          <span id="histUserName">—</span>
        </div>
        <button class="icon-btn" onclick="toggleTheme()" title="Alternar tema">🌙</button>
      </div>
    </div>
    <div class="main-content">
      <div class="section-head"><div><h2>Histórico</h2><p>Tarefas concluídas</p></div></div>
      <div id="historyList"></div>
    </div>
    <nav class="bottom-nav">
      <button class="nav-item" data-screen="home"><span class="nav-icon">🏠</span>Hoje</button>
      <button class="nav-item active" data-screen="history"><span class="nav-icon">📋</span>Histórico</button>
      <button class="nav-item" data-screen="medals"><span class="nav-icon">🏆</span>Medalhas</button>
      <button class="nav-item" data-screen="config"><span class="nav-icon">⚙️</span>Config</button>
    </nav>
  </div>

  <!-- MEDALS -->
  <div class="screen" id="screen-medals">
    <div class="topbar">
      <div class="topbar-logo"><img src="/logo.jpg" alt="CasaClean" class="topbar-logo-img"></div>
      <div class="topbar-actions">
        <div class="avatar-pill" id="medUserPill" onclick="logout()">
          <div class="av" id="medUserAv"></div>
          <span id="medUserName">—</span>
        </div>
        <button class="icon-btn" onclick="toggleTheme()" title="Alternar tema">🌙</button>
      </div>
    </div>
    <div class="main-content">
      <div class="section-head"><div><h2>Medalhas &amp; Ranking</h2><p>Performance da casa</p></div></div>
      <div class="tab-bar">
        <button class="tab active" data-tab="ranking">🏆 Ranking</button>
        <button class="tab" data-tab="medals">🎖 Conquistas</button>
      </div>
      <div id="rankingTab"><div id="rankingList"></div></div>
      <div id="medalsTab" style="display:none"><div class="medals-grid" id="medalsList"></div></div>
    </div>
    <nav class="bottom-nav">
      <button class="nav-item" data-screen="home"><span class="nav-icon">🏠</span>Hoje</button>
      <button class="nav-item" data-screen="history"><span class="nav-icon">📋</span>Histórico</button>
      <button class="nav-item active" data-screen="medals"><span class="nav-icon">🏆</span>Medalhas</button>
      <button class="nav-item" data-screen="config"><span class="nav-icon">⚙️</span>Config</button>
    </nav>
  </div>

  <!-- CONFIG -->
  <div class="screen" id="screen-config">
    <div class="topbar">
      <div class="topbar-logo"><img src="/logo.jpg" alt="CasaClean" class="topbar-logo-img"></div>
      <div class="topbar-actions">
        <div class="avatar-pill" id="cfgUserPill" onclick="logout()">
          <div class="av" id="cfgUserAv"></div>
          <span id="cfgUserName">—</span>
        </div>
        <button class="icon-btn" onclick="toggleTheme()" title="Alternar tema">🌙</button>
      </div>
    </div>
    <div class="main-content">
      <div class="section-head"><div><h2>Configurações</h2><p>Gerencie o app</p></div></div>

      <div class="tab-bar">
        <button class="tab active" data-tab="add-today">+ Hoje</button>
        <button class="tab" data-tab="deadlines">⏰ Prazos</button>
        <button class="tab" data-tab="users-admin">👥 Usuários</button>
        <button class="tab" data-tab="schedule-admin">📅 Escala</button>
      </div>

      <div id="tab-add-today">
        <div class="card">
          <h3 style="margin-bottom:16px">Tarefa extra de hoje</h3>
          <form id="formAddToday">
            <div class="form-group">
              <label>Nome da tarefa</label>
              <input class="form-control" id="tNome" type="text" placeholder="Ex: Limpar janela" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Responsável</label>
                <select class="form-control" id="tUser" required></select>
              </div>
              <div class="form-group">
                <label>Horário sugerido</label>
                <input class="form-control" id="tHora" type="time" value="18:00">
              </div>
            </div>
            <button class="btn btn-primary btn-full" type="submit">Criar tarefa de hoje</button>
          </form>
        </div>
      </div>

      <div id="tab-deadlines" style="display:none">
        <div id="deadlinesAdminList"></div>
      </div>

      <div id="tab-users-admin" style="display:none">
        <div id="usersAdminList"></div>
      </div>

      <div id="tab-schedule-admin" style="display:none">
        <div id="scheduleViewList"></div>
      </div>

      <div class="divider"></div>
      <button class="btn btn-danger btn-full" onclick="clearTodayData()">🗑 Limpar dados de hoje (debug)</button>
    </div>
    <nav class="bottom-nav">
      <button class="nav-item" data-screen="home"><span class="nav-icon">🏠</span>Hoje</button>
      <button class="nav-item" data-screen="history"><span class="nav-icon">📋</span>Histórico</button>
      <button class="nav-item" data-screen="medals"><span class="nav-icon">🏆</span>Medalhas</button>
      <button class="nav-item active" data-screen="config"><span class="nav-icon">⚙️</span>Config</button>
    </nav>
  </div>

</div>

<!-- Firebase v8 compat (CDN) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Theme toggle -->
<script>
  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('cc-theme', 'light');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      localStorage.setItem('cc-theme', 'dark');
    }
    syncThemeButtons();
  }
  function syncThemeButtons() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.querySelectorAll('.icon-btn[onclick="toggleTheme()"]').forEach(btn => {
      btn.textContent = isDark ? '☀️' : '🌙';
      btn.title = isDark ? 'Modo claro' : 'Modo escuro';
    });
  }
  document.addEventListener('DOMContentLoaded', syncThemeButtons);
</script>

<!-- Lightbox -->
<script>
  function openLightbox(src) {
    const lb = document.getElementById('lightbox');
    const img = document.getElementById('lightboxImg');
    img.src = src;
    lb.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.add('hidden');
    document.getElementById('lightboxImg').src = '';
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });
</script>

<!-- App -->
<script src="data.js"></script>
<script src="firebase.js"></script>
<script src="storage.js"></script>
<script src="app.js"></script>
</body>
</html>
